<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lịch lớp - Học sinh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20260707-7" />
</head>
<body class="student-page">
  <header>
    <div class="topbar">
      <div class="brand">
        <div class="logo" aria-label="Olympus English"></div>
        <div>
          <h1>Lịch Lớp <span class="badge-soft">Học sinh</span></h1>
          <p class="sub">Tích những buổi bạn bận để giáo viên chọn lịch học phù hợp.</p>
        </div>
      </div>
      <div class="header-actions">
        <a class="student-link" href="index.html">Trang giáo viên</a>
        <button id="btn-theme" class="theme-toggle" title="Chuyển Light/Dark">🌙</button>
      </div>
    </div>
  </header>

  <section class="tab-panel active">
    <div class="card student-card">
      <h2>Đăng ký lịch bận</h2>
      <p class="hint">Nhập đầy đủ họ tên và ngày tháng năm sinh để tránh nhầm học sinh trùng tên.</p>

      <label>Chọn lớp</label>
      <div id="s-classes" class="class-checklist"></div>
      <label>Họ tên đầy đủ
        <input id="s-name" type="text" placeholder="vd: Lê Đăng Khôi" autocomplete="name" />
      </label>
      <label>Ngày tháng năm sinh
        <input id="s-dob" type="text" placeholder="dd/mm/yyyy" inputmode="numeric" autocomplete="bday" maxlength="10" />
      </label>

      <div id="s-grid" class="grid-wrap"></div>

      <button id="btn-submit" class="primary">Gửi đăng ký</button>
      <button id="btn-lookup" class="secondary">Tra cứu lịch lớp</button>
      <p id="submit-msg" class="msg"></p>
      <p id="lookup-msg" class="msg"></p>
      <div id="lookup-result" class="lookup-result"></div>
    </div>
  </section>

  <script src="config.js"></script>
  <script src="app.js?v=20260707-8"></script>
</body>
</html>
